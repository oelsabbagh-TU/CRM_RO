General:
  nTimesteps: 24 # number of timesteps
  nReprDays: 1 # days
  nDays: 365 # days
  nYears: 1 # years
  sigmaCM: 1 # CM switch

ADMM:
  rho_EOM: 1.2 # rho ADMM penalty term, EOM
  rho_CM: 1 # rho ADMM penalty term, CM
  max_iter: 5000
  epsilon: 0.1 # 0.1 # stopping criterion - tolerance on "accuracy" with which the coupling constraints are satisfied. Applied to dual and primal residuals.
  CircularBufferSize: 5 # number of iterations for which data will be retained, should be at least 2 and less than max_iter

EOM:
  parameter_A: 1 # dummy, not used


Consumers: # consumers by zones
  A:
    WTP: 4000 # Max clearing price (€/MWh)
    D: "A" # Demand timeseries that needs to be picked up
    ela: 0.04 # fraction of demand that is elastic # 0.04 at WTP = 4000, 0.2 at WTP = 20000
    sigmaCM: 1
    NodeShare:
      n1: 0.5
      n2: 0.5

  B:
    WTP: 4000 #4000.0 # Max clearing price (€/MWh)
    D: "B" # Timeseries that needs to be picked up
    ela: 0.04 # fraction of demand that is elastic
    sigmaCM: 1
    NodeShare:
        n3: 1.0

Generators:
  # OPEX are parametrized as a/2 x g^2 + b x g
  A:
    Baseload:
      a: 0.008 # (€/MWh)^2
      b: 20 # €/MWh
      C: 0 # MW - existing capacity (set to zero if greenfield)
      I: 190000 # €/MW-year - annualized investment cost
      max_cap: 100000 # MW - maximum capacity
      sigmaCM: 1
      DF: 1.0 # derating factor
      NodeShare:
          n1: 0.5
          n2: 0.5

    MidMerit:
      a: 0.032 # (€/MWh)^2
      b: 55 # €/MWh
      C: 0 # MW - existing capacity (set to zero if greenfield)
      I: 110000 # €/MW-year - annualized investment cost
      max_cap: 100000 # MW - maximum capacity
      sigmaCM: 1
      DF: 1.0 # derating factor
      NodeShare:
          n1: 0.5
          n2: 0.5

    Peak:
      a: 0.04 # (€/MWh)^2
      b: 100 # €/MWh
      C: 0 # MW - existing capacity (set to zero if greenfield)
      I: 60000 # €/MW-year - annualized investment cost
      max_cap: 100000 # MW - maximum capacity
      sigmaCM: 1
      DF: 1.0 # derating factor
      NodeShare:
          n1: 0.5
          n2: 0.5

    WindOnshore:
      a: 0 # (€/MWh)^2
      b: 0 # €/MWh
      C: 13700 # MW
      I: 300000 # €/MW-year - annualized investment cost
      max_cap: 13700 # MW - maximum capacity
      AF: "A"
      sigmaCM: 0
      DF: 0 # derating factor
      NodeShare:
          n1: 0.5
          n2: 0.5
    PV:
      a: 0 # (€/MWh)^2
      b: 0 # €/MWh
      C: 15403 # MW
      I: 300000 # k€/MW-year - annualized investment cost
      max_cap: 15403 # MW - maximum capacity
      AF: "A"
      sigmaCM: 0
      DF: 0 # derating factor
      NodeShare:
          n1: 0.5
          n2: 0.5
  B:
    Baseload:
      a: 0.008 # (€/MWh)^2
      b: 20 # €/MWh
      C: 0 # MW - existing capacity (set to zero if greenfield)
      I: 190000 # €/MW-year - annualized investment cost (convert to €/MW-year?)
      max_cap: 100000 # MW - maximum capacity
      sigmaCM: 1
      DF: 1.0 # derating factor
      NodeShare:
          n3: 1.0

    MidMerit:
      a: 0.032 # (€/MWh)^2
      b: 55 # €/MWh
      C: 0 # MW - existing capacity (set to zero if greenfield)
      I: 110000 # €/MW-year - annualized investment cost
      max_cap: 100000 # MW - maximum capacity
      sigmaCM: 1
      DF: 1.0 # derating factor
      NodeShare:
          n3: 1.0

    Peak:
      a: 0.06 # (€/MWh)^2
      b: 100 # €/MWh
      C: 0 # MW - existing capacity (set to zero if greenfield)
      I: 70000 # €/MW-year - annualized investment cost
      max_cap: 100000 # MW - maximum capacity
      sigmaCM: 1
      DF: 1.0 # derating factor
      NodeShare:
          n3: 1.0

    WindOnshore:
      a: 0 # (€/MWh)^2
      b: 0 # €/MWh
      C: 5315 # MW
      I: 300000 # €/MW-year - annualized investment cost
      max_cap: 5315 # MW - maximum capacity
      AF: "B"
      sigmaCM: 0
      DF: 0 # derating factor
      NodeShare:
          n3: 1.0

    PV:
      a: 0 # (€/MWh)^2
      b: 0 # €/MWh
      C: 8788 # MW
      I: 300000 # €/MW-year - annualized investment cost
      max_cap: 8788 # MW - maximum capacity
      AF: "B"
      sigmaCM: 0
      DF: 0 # derating factor
      NodeShare:
          n3: 1.0

CM:
  A:
    # capacity target for zone A (two-zone setup, values retained from three-zone config)
    capacity_target: 17629.87
    price_target: 60000    # €/MW (price target for zone A - CONE)
    capacity_margin: 0.1     # 10% capacity margin
    min_price: -10000000
    max_price: 10000000
    D: "A"
  B:
    capacity_target: 15468.46
    price_target: 70000
    capacity_margin: 0.1
    min_price: -10000000
    max_price: 10000000
    D: "B"

Network:
  ZoneMap:
    A: [n1, n2]
    B: [n3]

  TCONNECT:
    - [A, B]
    - [B, A]

  ATC:
    A:
      B: [3000.0, -3000.0]  # [forward limit, backward limit] — border line L3-1 Fmax
    B:
      A: [3000.0, -3000.0]

  reserve_cost: 1000000 # €/MW-year

  nLines: 2
  nScenarios: 3
  lines: "lines"  # lines dataframe
  coupling: "ATC"  # two-zone runs use a simple bilateral border limit
  # IC_reserve: 500000 # €/MW-year higher than the highest fixed cost
  # MC_reserve: 50000 # €/MWh higher than voll


# same variable cost for all generators.
